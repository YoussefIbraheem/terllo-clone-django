board:
  boards_list:
    name: boards_list
    description: Retrieve a list of boards for a specific project.
    method: GET
    parameters:
      - name: project_id
        parameter_type: query
        type: integer
        required: true
        example: 1
      - name: limit
        parameter_type: query
        type: integer
        required: false
        example: 10
      - name: offset
        parameter_type: query
        type: integer
        required: false
        example: 0

  board_get:
    name: board_get
    description: Retrieve a specific board by its ID.
    method: GET
    parameters:
      - name: board_id
        parameter_type: path
        type: integer
        required: true
        example: 1

  board_create:
    name: board_create
    description: Create a new board.
    method: POST
    parameters:
      - name: name
        parameter_type: body
        type: string
        required: true
        example: "Board 1"
      - name: description
        parameter_type: body
        type: string
        required: false
        example: "A project board"
      - name: project_id
        parameter_type: body
        type: string
        required: true
        example: "1"
      - name: columns
        parameter_type: body
        type: array
        required: false
        example: ["ToDo", "InProgress", "Done"]

  board_update:
    name: board_update
    description: Update a specific board by its ID.
    method: PUT
    parameters:
      - name: board_id
        parameter_type: path
        type: integer
        required: true
        example: 1
      - name: name
        parameter_type: body
        type: string
        required: false
        example: "Board 1"
      - name: description
        parameter_type: body
        type: string
        required: false
        example: "A project board"

  board_delete:
    name: board_delete
    description: Delete a specific board by its ID.
    method: DELETE
    parameters:
      - name: board_id
        parameter_type: path
        type: integer
        required: true
        example: 1

project:
  projects_list:
    name: projects_list
    description: Retrieve a paginated list of projects filtered by owner.
    method: GET
    parameters:
      - name: owner_id
        parameter_type: query
        type: integer
        required: false
        example: 1
      - name: limit
        parameter_type: query
        type: integer
        required: false
        example: 10
      - name: offset
        parameter_type: query
        type: integer
        required: false
        example: 0

  project_details:
    name: project_details
    description: Retrieve details of a specific project by ID.
    method: GET
    parameters:
      - name: project_id
        parameter_type: path
        type: integer
        required: true
        example: 1

  project_create:
    name: project_create
    description: Create a new project with provided data.
    method: POST
    parameters:
      - name: name
        parameter_type: body
        type: string
        required: true
        example: "Project 1"
      - name: description
        parameter_type: body
        type: string
        required: false
        example: "A new project"
      - name: owner_id
        parameter_type: body
        type: integer
        required: true
        example: 1

  project_update:
    name: project_update
    description: Update an existing project with new data.
    method: PUT
    parameters:
      - name: project_id
        parameter_type: path
        type: integer
        required: true
        example: 1
      - name: name
        parameter_type: body
        type: string
        required: false
        example: "Project 1"
      - name: description
        parameter_type: body
        type: string
        required: false
        example: "An updated project"

  project_delete:
    name: project_delete
    description: Delete a project by ID.
    method: DELETE
    parameters:
      - name: project_id
        parameter_type: path
        type: integer
        required: true
        example: 1

task:
